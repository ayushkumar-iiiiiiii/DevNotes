<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <div id="signup-container">
        <p>Create a new account</p>
        <div id="user-inputs">
            <div>
                <input type="text" id="email" placeholder="Your Email" class="user-inputs">
                <p class="cred_fedback" id="email_feedback"></p>
            </div>
            <div>
                <input type="text" id="phone-no" placeholder="Your Phone No." class="user-inputs">
                <p class="cred_fedback" id="phone_feedback"></p>
            </div>
            <div>
                <input type="text" id="username" placeholder="Username" class="user-inputs">
                <p class="cred_fedback" id="username_feedback"></p>
            </div>
            <div>
                <input type="text" id="user-pass" placeholder="Password" class="user-inputs">
                <p class="cred_fedback" id="pass_feedback"></p>
            </div>
            
        </div>
        <div id="signup-login-btns">
            <button class="signup-login-btns" id="signup-btn-(sign)">Sign up</button>
            <button class="signup-login-btns" id="login-btn-(sign)">Already have account, Log in</button>
        </div>
    </div>
    <script type="module" src="/scr/signup.js"></script>
</body>
</html>
