<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="signup-container">
        <p>Login to your account</p>
        <div id="user-inputs">
            <div>
                <input type="text" id="email_or_username_input" placeholder="Email or Username" class="user-inputs">
                <p class="cred_fedback" id="email_or_usernamefeedback"></p>
            </div>
            <div>
                <input type="text" id="password_input" placeholder="Password" class="user-inputs">
                <p class="cred_fedback" id="Password_feedback"></p>
            </div>
        </div>
        <div id="signup-login-btns">
            <button class="signup-login-btns" id="login-btn-(login)">Log in</button>
            <button class="signup-login-btns" id="signup-btn-(login)">Don't have account, Sign up</button>
        </div>
    </div>
    <script type="module" src="/scr/login.js"></script>
</body>
</html>
