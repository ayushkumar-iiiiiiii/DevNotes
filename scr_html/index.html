<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevNotes</title>
    <link rel="icon" type="image/x-icon" href="./../images/favicon.ico">
</head>

<body>

    <div id="TopNavBar">

        <img src="./../images/logo.png" alt="logo" id="logo">

        <div id="authbtn">

            <button id="LoginBtn" class="authbtn">Login</button>
            <button id="SignUpBtn" class="authbtn">Signup</button>

        </div>

    </div>


    <div id="hero">

        <div id="heroText">

            <div id="heroH1text" class="heroH1text">

                <h1>
                    Capture ideas.
                    <br>
                    Build knowlage.
                </h1>

            </div>

            <div id="heroh4text">
                <p>
                    Simple, fast note-taking that stays out your way. <br>
                    Write, organize, search, and revisit everthing that matters.
                </p>
            </div>

        </div>

        <div id="herobtn">

            <button id="getstarted" class="herobtn">Get Started</button>
            <button id="learnmore" class="herobtn">Learn more</button>

        </div>

    </div>



    <div id="features">

        <h1 class="featureH1text">
            Features
        </h1>

        <div id="featureImg">

            <img src="./../images/featureimg2.png" alt="" class="featureImg">
            <img src="./../images/featureimg3.png" alt="" class="featureImg">
        </div>

    </div>


    <div id="websiteSS">

        <div id="takeAlook">
            <h1>
                Take a look
            </h1>
        </div>

        <div id="ss">
            <img src="./../images/notepagess.png" alt="">
        </div>

    </div>


    <div id="footer">
        <button id="aboutBtn" class="footerBtn">About</button>
        <button id="githubBtn" class="footerBtn">GitHub</button>
        <button id="privacyBtn" class="footerBtn">Privacy</button>
        <button id="tremBtn" class="footerBtn">Trems</button>
        <button id="contactBtn" class="footerBtn">Contact</button>
    </div>


    <script type="module" src="./../scr/scr_js/index.js"></script>

</html>
