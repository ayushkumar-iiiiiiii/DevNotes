<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevNotes</title>
  <script type="module" crossorigin src="/assets/notes-DaTQKZN4.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/apis-CrPEEfEu.js">
  <link rel="stylesheet" crossorigin href="/assets/notes-Ddtmxj6I.css">
</head>

<body>
    <div id="top_nav_bar" style="grid-area: top_nav_bar;">

        <input type="text" id="search">
        <button id="new_note_btn">New note</button>
        <button id="notification_icon_btn"></button>
        <button id="user_profile_btn"></button>

    </div>

    <div id="side_nav_bar" style="grid-area: side_nav_bar;">

        

        <!-- <div id="side_nav_bar_content"> -->
            <h1 id="logo_name">DevNotes</h1>
            <button id="all_notes_btn" class="side_nav_bar_content">All Notes</button>
            <button id="pinned" class="side_nav_bar_content">pinned</button>
            <button id="favorites" class="side_nav_bar_content">fev</button>
            <button id="archive" class="side_nav_bar_content">archive</button>
            <button id="trash" class="side_nav_bar_content">trash</button>
            <button id="logout_btn">Logout</button>
        <!-- </div> -->


    </div>

    <div id="main_content_container">

        <div id="main_contant" style="grid-area: main_contant;">

        <div id="notes">

            <div id="all_notes">

            </div>

        </div>

        <div id="tell_the_page_is_end"></div>

    </div>

    <div id="note_editor">


        <div id="note_editor_header">
            <input type="text" id="seacrh_in_notes" placeholder="find the word">
            <button id="savebtn">save</button>
            <button id="editor_opitions">⋮</button>
            <button id="close_editor">X</button>
        </div>

        <div id="note_inputs">
            <textarea name="note_main_containt" class="note_editor_main_containt" id="title" placeholder="Title "
            rows="1"></textarea>
            <textarea name="note_main_containt" class="note_editor_main_containt" id="subject" placeholder="subject "></textarea>
            <textarea name="note_main_containt" class="note_editor_main_containt" id="notes_main_contant"></textarea>
        </div>

    </div>

    </div>

</body>

</html>
